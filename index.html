<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de moedas</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Roboto+Slab:wght@100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <img src="./assets/logo.gif" alt="logo" class="logo">
    <main>

        <label>
            Converter <b>de</b>
            <select>
                <option>R$ Real brasileiro</option>
            </select>
        </label>
        <label>
            Converter <b>para</b>
            <select class="currency-select">
                <option value="dolar">US$ Dólar americano</option>
                <option value="euro">€ Euro</option>
                <option value="libra">£ Libra</option>
                <option value="Bitcoin">₿ Bitcoin</option>
                <option value="iene">¥ Iene Japonês</option>
            </select>
        </label>
        <label>
            Valor a ser convertido
            <input class="input-currency" placeholder="Digite o valor">
        </label>

        <button class="convert-button">Converter</button>

        <div class="dad">
            <div class="son">
                <img class="currency-img-brasil" src="./assets/brasil.svg" alt="bandeira do brasil">
                <p class="currency-b">R$ Real</p>
                <p class="currency-value-real">0,00</p>
            </div class="lados">
            <div class="son-2">
                <img src="./assets/vector.svg" alt="seta">
            </div>
            <div class="son-3">
                <img class="currency-img" src="./assets/estados-unidos.svg" alt="bandeira dos estados unidos">
                <p class="currency" id="currency-name">U$ Dolar</p>
                <p class="currency-value-dolar">0,00</p>
            </div>
        </div>
    </main>
    <script src="./script.js"></script>
</body>

</html>
